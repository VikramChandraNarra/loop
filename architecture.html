<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Ring: Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Newsreader:ital,opsz,wght@1,18,400;1,18,500;0,18,400&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbfcfe; --grid:#d8dce6; --ink:#1f2430; --muted:#6b7280; --faint:#9aa1ad;
    --line:#c7cdd9; --frame:#d7dbe6;
    --yellow:#fff3bf; --blue:#d0ebff; --violet:#e5dbff; --green:#d3f9d8;
    --pink:#ffe3ec; --orange:#ffe8cc; --teal:#c3fae8;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --sh:0 6px 16px rgba(20,28,48,.09),0 1px 2px rgba(0,0,0,.05);
    --sh-lg:0 10px 26px rgba(20,28,48,.14),0 2px 4px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;color:var(--ink);
    font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{background:var(--bg);overflow:hidden}
  body.show-mock{}
  /* Loop design animations */
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  @keyframes drift{0%,100%{transform:translate(0,0) scale(1);opacity:0.7}50%{transform:translate(5px,-7px) scale(1.08);opacity:1}}
  @keyframes sheen{0%,100%{transform:translate(0,0);opacity:0.5}50%{transform:translate(-8px,7px);opacity:0.85}}
  @keyframes scan{0%{transform:scale(0.3);opacity:0.7}100%{transform:scale(1);opacity:0}}
  @keyframes ripple{0%{transform:scale(0.6);opacity:0.5}100%{transform:scale(2.2);opacity:0}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  @keyframes dotwave{0%,60%,100%{transform:translateY(0);opacity:0.5}30%{transform:translateY(-4px);opacity:1}}
  /* mockups board uses the Loop cream canvas + design type */
  #board2{background-color:oklch(0.93 0.008 84)}
  .dcnode{width:300px;font-family:'Hanken Grotesk',sans-serif}
  .dcnode *{box-sizing:border-box}

  /* view switcher */
  .viewtabs{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:60;
    display:flex;gap:4px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:13px;padding:5px;box-shadow:var(--sh)}
  .viewtabs button{font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--muted);
    border:none;background:transparent;border-radius:9px;padding:7px 17px;cursor:pointer;letter-spacing:-.01em}
  .viewtabs button.on{background:var(--ink);color:#fff}

  /* view visibility: two full-screen whiteboards toggled by body.show-mock */
  #board2,.topbar2{display:none}
  body.show-mock #board,
  body.show-mock .topbar,
  body.show-mock .legend,
  body.show-mock .note-rule{display:none}
  body.show-mock #board2{display:block}
  body.show-mock .topbar2{display:flex}

  /* whiteboard surface */
  .wb{position:fixed;inset:0;overflow:hidden;cursor:grab;background-color:var(--bg);
    background-image:radial-gradient(var(--grid) 1.1px,transparent 1.1px);
    background-size:22px 22px;}
  .wb.panning{cursor:grabbing}
  .world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
  .wires{position:absolute;left:0;top:0;overflow:visible;pointer-events:none}

  /* draggable node base (both boards) */
  .wbnode{position:absolute;cursor:grab}
  .wbnode.dragging{cursor:grabbing;z-index:25}

  .colhead{position:absolute;font-family:var(--mono);font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:8px;white-space:nowrap}
  .colhead .n{width:18px;height:18px;border-radius:50%;background:var(--ink);color:#fff;
    display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

  /* architecture cards */
  .node{background:var(--c,#fff);border-radius:13px;padding:13px 14px 12px;
    box-shadow:var(--sh);border:1px solid rgba(0,0,0,.05);
    transition:box-shadow .15s,transform .15s}
  .node:hover{box-shadow:var(--sh-lg);transform:translateY(-2px)}
  .node.dragging{box-shadow:var(--sh-lg);transform:none}
  .node .ttl{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;letter-spacing:-.01em}
  .nrow{display:flex;gap:11px;align-items:flex-start}
  .nrow .bd{flex:1;min-width:0}
  .node .ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    flex:none;background:#e9edf3;color:#46506a}
  .node .ic svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .y .ic{background:#fbe6a3;color:#8a6500} .b .ic{background:#b3dbfa;color:#15639f}
  .v .ic{background:#d4c2fb;color:#623dc0} .g .ic{background:#b2e7be;color:#1c8146}
  .o .ic{background:#ffd09c;color:#a25c14} .t .ic{background:#98ecdc;color:#0b7568}
  #chat .ic{background:#98ecdc;color:#0b7568} #mcp .ic{background:#b2e7be;color:#1c8146}
  .node .say{font-size:12px;color:#3c4250;margin-top:6px;line-height:1.42}
  .y{--c:var(--yellow)} .b{--c:var(--blue)} .v{--c:var(--violet)}
  .g{--c:var(--green)} .p{--c:var(--pink)} .o{--c:var(--orange)} .t{--c:var(--teal)}

  /* ring source node */
  #ringNode{--c:#fff;border:1px solid rgba(0,0,0,.06)}
  #ringNode .canvasWrap{position:relative;width:150px;height:150px;margin:0 auto}
  #ringCanvas{width:150px;height:150px;display:block}
  #ringLoading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:10px;color:var(--faint)}
  #ringNode .nm{text-align:center;font-size:15px;font-weight:800;margin-top:2px}
  #ringNode .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;justify-content:center}
  .chip{font-size:10.5px;font-family:var(--mono);background:#f4f6fa;border:1px solid #e6e9f0;
    border-radius:7px;padding:3px 7px;color:#41485a;white-space:nowrap}
  #ringNode .noled{text-align:center;font-size:10px;color:var(--faint);margin-top:8px;font-family:var(--mono)}

  /* mcp hero */
  #mcp{--c:var(--green);border:1.5px solid #79c98e}
  #mcp .ttl{font-size:15px}

  /* built-in chatbot (first-party, no MCP) */
  #chat{--c:var(--teal);border:1.5px solid #5fc4b5}
  #chat .pill{display:inline-block;font-size:8.5px;font-family:var(--mono);background:#0c8074;color:#fff;
    border-radius:6px;padding:2px 6px;margin-left:4px;letter-spacing:.05em;vertical-align:middle;font-weight:700}

  /* distribution (arch node) */
  #dist{--c:#fff}
  #dist .dh{font-size:13px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:5px}
  #dist .dh svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round;color:#384150}
  #dist .leg{font-size:9.5px;font-family:var(--mono);color:var(--faint);margin-bottom:9px;display:flex;gap:12px}
  #dist .leg b{font-weight:700}
  .dot-ok{color:#2f9e54} .dot-man{color:#d8803a}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .tile{background:var(--pink);border-radius:9px;padding:7px 9px;border:1px solid rgba(0,0,0,.04)}
  .tile.manual{background:var(--orange);border-color:#f0c89a}
  .tile .h{font-size:11.5px;font-weight:700;display:flex;align-items:center;gap:6px}
  .tile .h svg{width:13px;height:13px;flex:none;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round;color:#5a6170}
  .tile.manual .h svg{color:#a25c14}
  .tile .h .badge{margin-left:auto;font-size:9px}
  .tile .d{font-size:10px;color:#5a6170;margin-top:1px}

  /* chrome */
  .topbar{position:fixed;top:16px;left:18px;z-index:40;display:flex;align-items:center;gap:14px;
    background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border:1px solid var(--line);
    border-radius:13px;padding:9px 15px;box-shadow:var(--sh)}
  .topbar h1{font-size:15px;margin:0;font-weight:700;letter-spacing:-.01em}
  .topbar .kick{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
  .topbar .hint{font-size:12px;color:var(--muted);border-left:1px solid var(--line);padding-left:14px}
  .topbar .hint b{color:var(--ink)}

  .legend{position:fixed;top:16px;right:18px;z-index:40;display:flex;flex-direction:column;gap:6px;
    background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border:1px solid var(--line);
    border-radius:13px;padding:11px 14px;box-shadow:var(--sh)}
  .legend span{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted)}
  .legend i{width:12px;height:12px;border-radius:4px;border:1px solid rgba(0,0,0,.07)}

  .tools{position:fixed;bottom:20px;right:20px;z-index:40;display:flex;align-items:center;gap:6px;
    background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border:1px solid var(--line);
    border-radius:12px;padding:6px;box-shadow:var(--sh)}
  .tools button{width:32px;height:32px;border:none;background:#f1f3f8;border-radius:8px;cursor:pointer;
    font-size:16px;color:var(--ink);display:flex;align-items:center;justify-content:center}
  .tools button:hover{background:#e6e9f1}
  .tools .zl{font-family:var(--mono);font-size:12px;color:var(--muted);min-width:42px;text-align:center}

  .note-rule{position:fixed;bottom:20px;left:20px;z-index:40;max-width:430px;font-size:11.5px;
    color:var(--muted);line-height:1.5;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:12px;padding:10px 14px;box-shadow:var(--sh)}
  .note-rule b{color:var(--ink)}

  /* ============================================================ phone nodes (mock board) */
  .mockcard{width:238px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .steplabel{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;color:var(--muted);
    display:flex;gap:8px;align-items:center;white-space:nowrap;text-transform:uppercase}
  .steplabel .sn{width:19px;height:19px;border-radius:50%;background:var(--ink);color:#fff;font-size:10px;
    font-weight:700;display:inline-flex;align-items:center;justify-content:center}

  .phone{width:238px;height:486px;background:#0d0e12;border-radius:40px;padding:10px;
    box-shadow:0 24px 50px rgba(18,24,44,.30),0 3px 9px rgba(0,0,0,.20);position:relative}
  .phone::before{content:"";position:absolute;top:14px;left:50%;transform:translateX(-50%);
    width:80px;height:21px;background:#0d0e12;border-radius:0 0 15px 15px;z-index:3}
  .screen{width:100%;height:100%;border-radius:31px;overflow:hidden;background:#fff;
    display:flex;flex-direction:column;position:relative}
  .sbar{height:36px;display:flex;align-items:center;justify-content:space-between;padding:0 20px 0 22px;
    font-size:11px;font-weight:700;color:#1f2430;flex:0 0 auto}
  .sbar .r{display:flex;gap:6px;align-items:center;font-size:11px}
  .scrn{flex:1;display:flex;flex-direction:column;padding:14px 15px 16px;overflow:hidden}

  /* shared screen bits */
  .appbar{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14.5px;margin-bottom:13px;letter-spacing:-.01em}
  .appbar .live{width:9px;height:9px;border-radius:50%;background:#2f9e54;box-shadow:0 0 0 4px rgba(47,158,84,.16);flex:0 0 auto}
  .pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;
    background:#eef1f8;border:1px solid #e1e6f0;border-radius:20px;padding:4px 10px;color:#41485a;width:fit-content}
  .k{background:#f6f8fc;border:1px solid #e7ebf3;border-radius:13px;padding:11px 12px;margin-bottom:9px}
  .k .kt{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
  .k .kd{font-size:11px;color:#5a6170;margin-top:3px;line-height:1.42}
  .chk{display:flex;align-items:center;gap:9px;font-size:11.5px;color:#3c4250;padding:6px 0}
  .chk .cb{width:18px;height:18px;border-radius:50%;background:#d3f9d8;color:#2f9e54;display:inline-flex;
    align-items:center;justify-content:center;font-size:11px;flex:0 0 auto}
  .bubble{background:#eef4ff;border:1px solid #d7e6ff;border-radius:15px 15px 15px 5px;padding:11px 12px;
    font-size:12px;line-height:1.48;color:#2a3142}
  .tagrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px}
  .tag{font-family:var(--mono);font-size:10px;border-radius:7px;padding:4px 8px;background:#eef1f8;color:#5a6170;border:1px solid #e1e6f0}
  .tag.idea{background:#e5dbff;color:#5a3fa6;border-color:#d7c8ff}
  .tag.on{background:#d3f9d8;color:#1f7a3d;border-color:#aee9bd}
  .meta{margin-top:auto;font-family:var(--mono);font-size:9.5px;color:var(--faint);display:flex;align-items:center;gap:6px}

  /* capture screen */
  .cap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center}
  .mic{width:98px;height:98px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#fff,#eef2fb);
    border:1px solid #e3e8f2;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
  .mic::before,.mic::after{content:"";position:absolute;inset:-12px;border-radius:50%;
    border:2px solid rgba(80,120,255,.32);animation:pulse 2.2s ease-out infinite}
  .mic::after{animation-delay:1.1s}
  @keyframes pulse{0%{transform:scale(.82);opacity:.75}100%{transform:scale(1.55);opacity:0}}
  .cap .lis{font-size:14px;font-weight:700;color:#1f2430}
  .cap .sub{font-family:var(--mono);font-size:10.5px;color:var(--muted)}
  .wave{display:flex;align-items:flex-end;gap:3px;height:30px}
  .wave i{width:3px;background:#5078ff;border-radius:3px;animation:wv 1s ease-in-out infinite}
  @keyframes wv{0%,100%{height:7px}50%{height:27px}}
  .toast{background:#0d0e12;color:#fff;font-size:11px;font-weight:600;border-radius:22px;padding:9px 15px;
    display:flex;gap:8px;align-items:center}

  /* distribution cards (phone) */
  .draft{border-radius:13px;padding:10px 12px;margin-bottom:9px;border:1px solid rgba(0,0,0,.05)}
  .draft.x{background:#eef4ff;border-color:#d7e6ff}
  .draft.tk{background:#fff0f5;border-color:#ffd3e2}
  .draft.im{background:#ffe8cc;border-color:#f0c89a}
  .draft .dt{font-size:11.5px;font-weight:700;display:flex;align-items:center;gap:6px}
  .draft .dx{font-size:10.5px;color:#4a5160;margin:4px 0 8px;line-height:1.4}
  .send{font-size:10px;font-weight:700;font-family:var(--mono);border-radius:8px;padding:5px 11px;border:none;
    display:inline-flex;align-items:center;gap:5px;cursor:default}
  .send.go{background:#2f9e54;color:#fff}
  .send.tap{background:#fff;color:#c47a35;border:1px solid #e0a26a}
</style>
</head>
<body>

<div class="viewtabs">
  <button id="tabArch" class="on">Architecture</button>
  <button id="tabMock">Mockups</button>
</div>

<!-- ARCHITECTURE BOARD -->
<div id="board" class="wb">
  <div id="world" class="world">
    <svg id="wires" class="wires"></svg>
  </div>
</div>

<!-- MOCKUPS BOARD -->
<div id="board2" class="wb">
  <div id="world2" class="world">
    <svg id="wires2" class="wires"></svg>
  </div>
</div>

<div class="topbar">
  <div>
    <div class="kick">The Ring</div>
    <h1>Architecture</h1>
  </div>
</div>

<div class="topbar topbar2">
  <div>
    <div class="kick">The Ring</div>
    <h1>App mockups</h1>
  </div>
</div>

<div class="legend">
  <span><i style="background:var(--yellow)"></i> Raw signal</span>
  <span><i style="background:var(--blue)"></i> On-device compute</span>
  <span><i style="background:var(--violet)"></i> Context layer</span>
  <span><i style="background:var(--green)"></i> MCP interface</span>
  <span><i style="background:var(--pink)"></i> Distribution</span>
</div>

<div class="note-rule">
  <b>The one rule:</b> raw audio never leaves the device. Transcription and fusion run on the phone, only structured context crosses the MCP door, with your permission.
</div>

<div class="tools">
  <button id="zoomOut" title="Zoom out">−</button>
  <div class="zl" id="zoomLabel">100%</div>
  <button id="zoomIn" title="Zoom in">+</button>
  <button id="recenter" title="Fit to screen">⌖</button>
</div>

<script src="https://unpkg.com/three@0.134.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="ring-glb.js"></script>
<script>
const NS='http://www.w3.org/2000/svg';

/* ============================================================ architecture model */
const COLHEADS = [
  {n:1,x:40,  t:'On the finger'},
  {n:2,x:430, t:'Phone · Ingest'},
  {n:3,x:780, t:'Understand · on-device'},
  {n:4,x:1130,t:'Context layer'},
  {n:5,x:1560,t:'Built on your context'},
];
const R1=190,R2=345,R3=500,R4=655;

const NODES = {
  ring:  {x:40,  y:300, w:210, cls:'',  special:'ring'},

  rcv:   {x:430, y:R1, w:200, cls:'y', ic:'rcv', t:'Receiver',     s:'Companion app catches the Bluetooth stream and reassembles audio + sensor frames.'},
  clean: {x:430, y:R2, w:200, cls:'y', ic:'clean', t:'Clean-up',     s:'Cuts background noise and levels the volume.'},
  vad:   {x:430, y:R3, w:200, cls:'b', ic:'vad', t:'Listen only when talking', s:'Skips silence, compute runs on real speech. Saves battery.'},
  tap:   {x:430, y:R4, w:200, cls:'o', ic:'tap', t:'Double-tap trigger', s:'Accelerometer detects a double-tap to mark intentional capture.'},

  stt:   {x:780, y:R1, w:200, cls:'b', ic:'stt', t:'Speech → text', s:'Turns your narration into time-stamped text.'},
  intent:{x:780, y:R2, w:200, cls:'b', ic:'intent', t:'What you meant', s:'Sorts each thought: idea, task, reply, note.'},
  gps:   {x:780, y:R3, w:200, cls:'t', ic:'gps', t:'Location',      s:'Comes from the paired phone, there is no GPS in the ring.'},

  fusion:{x:1130,y:280, w:215, cls:'v', ic:'fusion', t:'Fuse everything', s:'Combines voice with heart rate, temp, motion and location into one timeline: what you said, how you felt, where you were.'},
  store: {x:1130,y:490, w:215, cls:'v', ic:'store', t:'Personal memory', s:'Encrypted on-device. Your ideas, health, places and time, all yours.'},

  chat:  {x:1560,y:150, w:215, cls:'', special:'chat', ic:'chat', t:'In-app chatbot', s:'Talk to your own data right inside the app. Ask questions, get answers, trigger actions. No external agent, no MCP setup needed.'},
  mcp:   {x:1560,y:330, w:215, cls:'', special:'mcp', ic:'mcp', t:'MCP Context Server', s:'One open door to your context. Any external agent plugs in and already knows you. Reads memory, sends actions back out.'},
  market:{x:1560,y:510, w:215, cls:'g', ic:'market', t:'Marketplace apps', s:'Other developers build on the same context via MCP. The ring becomes a platform.'},

  dist:  {x:1560,y:690, w:252, cls:'', special:'dist'},
};

const EDGES = [
  ['ring','rcv','BLE · audio + sensors','flow'],
  ['ring','tap','','flow'],
  ['tap','ring','haptic buzz ✓','feedback'],
  ['rcv','clean','','flow'],
  ['clean','vad','','flow'],
  ['vad','stt','speech only','flow'],
  ['stt','intent','','flow'],
  ['tap','intent','intentional','flow'],
  ['stt','fusion','text','fan'],
  ['intent','fusion','','fan'],
  ['rcv','fusion','biometrics + motion','fan'],
  ['gps','fusion','location · from phone','fan'],
  ['fusion','store','','flow'],
  ['store','chat','built-in, no MCP setup','direct'],
  ['store','mcp','open, via MCP','flow'],
  ['store','market','marketplace','flow'],
  ['store','dist','say it once','flow'],
];

const ICONS={
  rcv:'<path d="m7 7 10 10-5 5V2l5 5L7 17"/>',

  if(n.special==='ring'){

        <span class="chip">haptic out</span>
      </div>
      <div class="noled">no indicator LED, haptic-only feedback</div>`;
  }
  if(n.special==='mcp'){
    return `<div class="nrow"><div class="ic">${svgIcon('mcp')}</div><div class="bd"><div class="ttl">${n.t}</div><div class="say">${n.s}</div></div></div>`;
  }
  if(n.special==='chat'){
    return `<div class="nrow"><div class="ic">${svgIcon('chat')}</div><div class="bd"><div class="ttl">${n.t} <span class="pill">BUILT-IN</span></div><div class="say">${n.s}</div></div></div>`;
  }
  if(n.special==='dist'){
    return `<div class="dh">${svgIcon('send')} A thought turns into action</div>
      <div class="leg"><span><b class="dot-ok">●</b> one-tap · API</span><span><b class="dot-man">◐</b> manual · Apple sheet</span></div>
      <div class="tiles">
        <div class="tile"><div class="h">${svgIcon('hash')}<span>X / thread</span><span class="badge dot-ok">●</span></div><div class="d">in your voice</div></div>
        <div class="tile"><div class="h">${svgIcon('messages')}<span>Slack</span><span class="badge dot-ok">●</span></div><div class="d">DM or reply</div></div>
        <div class="tile"><div class="h">${svgIcon('mail')}<span>Email</span><span class="badge dot-ok">●</span></div><div class="d">Gmail / Graph API</div></div>
        <div class="tile"><div class="h">${svgIcon('ticket')}<span>Ticket</span><span class="badge dot-ok">●</span></div><div class="d">Linear · Jira · GitHub</div></div>
        <div class="tile"><div class="h">${svgIcon('list')}<span>Changelog</span><span class="badge dot-ok">●</span></div><div class="d">release note</div></div>
        <div class="tile"><div class="h">${svgIcon('check')}<span>TODO</span><span class="badge dot-ok">●</span></div><div class="d">right project</div></div>
        <div class="tile"><div class="h">${svgIcon('pen')}<span>Blog</span><span class="badge dot-ok">●</span></div><div class="d">draft skeleton</div></div>

  return `<div class="nrow"><div class="ic">${svgIcon(n.ic)}</div><div class="bd"><div class="ttl">${n.t}</div><div class="say">${n.s}</div></div></div>`;
}

/* ============================================================ reusable whiteboard engine */
function makeBoard(cfg){
  const {key, boardEl, worldEl, svgEl, nodes, edges, colheads, wrapClass, render, topPad}=cfg;

  (colheads||[]).forEach(h=>{
    const d=document.createElement('div'); d.className='colhead';
    d.style.left=h.x+'px'; d.style.top='110px';
    d.innerHTML=`<span class="n">${h.n}</span> ${h.t}`;
    worldEl.appendChild(d);
  });

  for(const id in nodes){
    const n=nodes[id];
    const el=document.createElement('div');
    el.className='wbnode '+wrapClass(n);
    if(n.special) el.id = n.special==='ring'?'ringNode':n.special;
    el.dataset.id=id; el.style.left=n.x+'px'; el.style.top=n.y+'px';
    if(n.w) el.style.width=n.w+'px';
    el.innerHTML=render(id,n);
    worldEl.appendChild(el); n.el=el;
  }

  svgEl.innerHTML=`<defs>
    <marker id="ah-${key}" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#aeb6c6"/></marker>
    <marker id="ahb-${key}" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e0a26a"/></marker>
    <marker id="ahd-${key}" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1ca39a"/></marker>
    <marker id="ahg-${key}" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2f9e54"/></marker>
  </defs><g></g>`;
  const wireG=svgEl.querySelector('g');

  function anchors(s,t){
    const sb={x:s.x,y:s.y,w:s.el.offsetWidth,h:s.el.offsetHeight};
    const tb={x:t.x,y:t.y,w:t.el.offsetWidth,h:t.el.offsetHeight};
    const scx=sb.x+sb.w/2, tcx=tb.x+tb.w/2;
    const fwd=tcx>=scx;
    const sx=fwd?sb.x+sb.w:sb.x, sy=sb.y+sb.h/2;
    const tx=fwd?tb.x:tb.x+tb.w, ty=tb.y+tb.h/2;
    return {sx,sy,tx,ty,fwd};
  }
  function drawWires(){
    wireG.innerHTML='';
    edges.forEach(([a,b,label,type])=>{
      const s=nodes[a],t=nodes[b]; if(!s||!t||!s.el||!t.el)return;
      const {sx,sy,tx,ty,fwd}=anchors(s,t);
      const dir=fwd?1:-1;
      const k=Math.max(45,Math.abs(tx-sx)*0.42);
      const bow=type==='feedback'?80:(type==='direct'?28:0);
      const c1x=sx+dir*k, c2x=tx-dir*k;
      const d=`M${sx},${sy} C${c1x},${sy+bow} ${c2x},${ty+bow} ${tx},${ty}`;
      const p=document.createElementNS(NS,'path');
      p.setAttribute('d',d); p.setAttribute('fill','none');
      if(type==='feedback'){p.setAttribute('stroke','#e0a26a');p.setAttribute('stroke-width','1.8');
        p.setAttribute('stroke-dasharray','5 4');p.setAttribute('marker-end',`url(#ahb-${key})`);}
      else if(type==='direct'){p.setAttribute('stroke','#1ca39a');p.setAttribute('stroke-width','2');
        p.setAttribute('stroke-dasharray','6 4');p.setAttribute('marker-end',`url(#ahd-${key})`);}
      else if(type==='mcp'){p.setAttribute('stroke','#2f9e54');p.setAttribute('stroke-width','2.4');
        p.setAttribute('marker-end',`url(#ahg-${key})`);}
      else{p.setAttribute('stroke',type==='fan'?'#c7cdde':'#aeb6c6');
        p.setAttribute('stroke-width',type==='fan'?'1.6':'2');p.setAttribute('marker-end',`url(#ah-${key})`);}
      wireG.appendChild(p);
      if(label){
        const mx=(sx+tx)/2, my=(sy+ty)/2+bow*0.75;
        const tEl=document.createElementNS(NS,'text');
        tEl.setAttribute('x',mx); tEl.setAttribute('y',my-3);
        tEl.setAttribute('text-anchor','middle');
        tEl.setAttribute('font-family','ui-monospace,Menlo,monospace');
        tEl.setAttribute('font-size','10.5');
        tEl.setAttribute('fill',type==='feedback'?'#c47a35':(type==='direct'?'#0c8074':(type==='mcp'?'#1f7a3d':'#5a6170')));
        tEl.setAttribute('paint-order','stroke');
        tEl.setAttribute('stroke','#fbfcfe'); tEl.setAttribute('stroke-width','3.5');
        tEl.setAttribute('stroke-linejoin','round');
        tEl.textContent=label;
        wireG.appendChild(tEl);
      }
    });
  }

  const view={x:0,y:0,scale:1};
  const zoomLabel=document.getElementById('zoomLabel');
  function applyView(){
    worldEl.style.transform=`translate(${view.x}px,${view.y}px) scale(${view.scale})`;
    boardEl.style.backgroundPosition=`${view.x}px ${view.y}px`;
    boardEl.style.backgroundSize=`${22*view.scale}px ${22*view.scale}px`;
    if(zoomLabel) zoomLabel.textContent=Math.round(view.scale*100)+'%';
  }
  function fitView(){
    let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
    for(const id in nodes){const n=nodes[id];
      minX=Math.min(minX,n.x);minY=Math.min(minY,n.y-(topPad||30));
      maxX=Math.max(maxX,n.x+n.el.offsetWidth);maxY=Math.max(maxY,n.y+n.el.offsetHeight);}
    const m=80;
    const s=Math.min(1.1,(innerWidth-2*m)/(maxX-minX),(innerHeight-2*m)/(maxY-minY));
    view.scale=Math.max(.35,s);
    view.x=(innerWidth-(minX+maxX)*view.scale)/2;
    view.y=(innerHeight-(minY+maxY)*view.scale)/2;
    applyView();
  }

  let panning=false,start={};
  boardEl.addEventListener('pointerdown',e=>{
    if(e.target.closest('.wbnode'))return;
    panning=true;boardEl.classList.add('panning');
    start={x:e.clientX,y:e.clientY,vx:view.x,vy:view.y};
    boardEl.setPointerCapture(e.pointerId);
  });
  boardEl.addEventListener('pointermove',e=>{if(!panning)return;
    view.x=start.vx+(e.clientX-start.x);view.y=start.vy+(e.clientY-start.y);applyView();});
  boardEl.addEventListener('pointerup',()=>{panning=false;boardEl.classList.remove('panning');});

  let drag=null;
  worldEl.addEventListener('pointerdown',e=>{
    const el=e.target.closest('.wbnode'); if(!el)return;
    const id=el.dataset.id, n=nodes[id];
    drag={el,n,sx:e.clientX,sy:e.clientY,ox:n.x,oy:n.y};
    el.classList.add('dragging'); el.setPointerCapture(e.pointerId); e.stopPropagation();
  });
  worldEl.addEventListener('pointermove',e=>{if(!drag)return;
    const dx=(e.clientX-drag.sx)/view.scale, dy=(e.clientY-drag.sy)/view.scale;
    drag.n.x=drag.ox+dx; drag.n.y=drag.oy+dy;
    drag.el.style.left=drag.n.x+'px'; drag.el.style.top=drag.n.y+'px';
    drawWires();});
  worldEl.addEventListener('pointerup',()=>{if(drag){drag.el.classList.remove('dragging');drag=null;}});

  boardEl.addEventListener('wheel',e=>{e.preventDefault();
    const ns=Math.max(.35,Math.min(2.4,view.scale*(e.deltaY<0?1.08:.92)));
    view.x=e.clientX-(e.clientX-view.x)*(ns/view.scale);
    view.y=e.clientY-(e.clientY-view.y)*(ns/view.scale);
    view.scale=ns;applyView();},{passive:false});

  drawWires();
  return {
    fit:fitView, draw:drawWires, applyView,
    zoomBy:f=>{view.scale=Math.max(.35,Math.min(2.4,view.scale*f));applyView();}
  };
}

/* ============================================================ instantiate boards */
const archBoard = makeBoard({
  key:'a',
  boardEl:document.getElementById('board'),
  worldEl:document.getElementById('world'),
  svgEl:document.getElementById('wires'),
  nodes:NODES, edges:EDGES, colheads:COLHEADS,
  wrapClass:n=>'node '+(n.cls||''), render:nodeInner, topPad:96,
});
const mockBoard = makeBoard({
  key:'m',
  boardEl:document.getElementById('board2'),
  worldEl:document.getElementById('world2'),
  svgEl:document.getElementById('wires2'),
  nodes:MNODES, edges:MEDGES, colheads:[],
  wrapClass:()=> 'dcnode', render:mockInner, topPad:40,
});
archBoard.fit();

/* ============================================================ view switcher + tools */
let active=archBoard, mockReady=false;
const tabArch=document.getElementById('tabArch');
const tabMock=document.getElementById('tabMock');
function show(mock){
  document.body.classList.toggle('show-mock',mock);
  tabArch.classList.toggle('on',!mock);
  tabMock.classList.toggle('on',mock);
  active = mock?mockBoard:archBoard;
  if(mock && !mockReady){
    requestAnimationFrame(()=>{mockBoard.draw();mockBoard.fit();mockReady=true;});
  }else{
    active.applyView();
  }
}
tabArch.onclick=()=>show(false);
tabMock.onclick=()=>show(true);

document.getElementById('zoomIn').onclick=()=>active.zoomBy(1.15);
document.getElementById('zoomOut').onclick=()=>active.zoomBy(.87);
document.getElementById('recenter').onclick=()=>active.fit();
addEventListener('resize',()=>{archBoard.applyView();if(mockReady)mockBoard.applyView();});

/* ============================================================ 3D ring (RingForge renderer) */
(function initRing(){
  const canvas=document.getElementById('ringCanvas');
  const loadingEl=document.getElementById('ringLoading');
  if(typeof THREE==='undefined'||typeof window.RING_GLB==='undefined'){
    if(loadingEl)loadingEl.textContent='3D unavailable (offline)';return;}
  const DPR=Math.min(devicePixelRatio||1,2);
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(DPR);renderer.setSize(150,150,false);
  renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.45;

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(34,1,0.1,100);
  camera.position.set(0,0.05,5);camera.lookAt(0,0,0);

  const ec=document.createElement('canvas');ec.width=256;ec.height=128;
  const g=ec.getContext('2d');
  const grd=g.createLinearGradient(0,0,0,128);
  grd.addColorStop(0,'#f7f8fa');grd.addColorStop(.42,'#dadbe0');grd.addColorStop(.5,'#bdbec3');
  grd.addColorStop(.58,'#7d7f85');grd.addColorStop(1,'#34353a');
  g.fillStyle=grd;g.fillRect(0,0,256,128);
  const box=(cx,cy,rx,ry,a)=>{g.save();g.translate(cx,cy);g.scale(1,ry/rx);
    const rg=g.createRadialGradient(0,0,0,0,0,rx);
    rg.addColorStop(0,`rgba(255,255,255,${a})`);rg.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle=rg;g.beginPath();g.arc(0,0,rx,0,7);g.fill();g.restore();};
  box(58,28,48,24,.95);box(168,20,42,18,.85);box(214,58,30,30,.45);
  const envTex=new THREE.CanvasTexture(ec);envTex.mapping=THREE.EquirectangularReflectionMapping;
  const pmrem=new THREE.PMREMGenerator(renderer);pmrem.compileEquirectangularShader();
  scene.environment=pmrem.fromEquirectangular(envTex).texture;

  const key=new THREE.DirectionalLight(0xffffff,2);key.position.set(-2.5,3.5,4);scene.add(key);
  const fill=new THREE.DirectionalLight(0xffffff,.9);fill.position.set(3,1,3.5);scene.add(fill);
  const rim=new THREE.DirectionalLight(0xcfe0ff,1.3);rim.position.set(2.5,-1,-4);scene.add(rim);
  scene.add(new THREE.HemisphereLight(0xffffff,0x8f9196,.55));
  scene.add(new THREE.AmbientLight(0xffffff,.2));

  const pivot=new THREE.Group();pivot.rotation.set(-0.32,1.12,0);scene.add(pivot);
  const spinner=new THREE.Group();pivot.add(spinner);
  const ringMat=new THREE.MeshPhysicalMaterial({color:0x121316,metalness:.92,roughness:.34,envMapIntensity:1.25,clearcoat:.35,clearcoatRoughness:.25});
  const innerMat=new THREE.MeshPhysicalMaterial({color:0x17181b,metalness:.05,roughness:.55,envMapIntensity:.7,clearcoat:.25,clearcoatRoughness:.35});

  function makeTwoTone(geom){
    geom.attributes.normal||geom.computeVertexNormals();
    const pos=geom.attributes.position.array,nor=geom.attributes.normal.array,hasIdx=!!geom.index;
    const triCount=hasIdx?geom.index.array.length/3:pos.length/9;
    const tri=t=>hasIdx?[geom.index.array[t*3],geom.index.array[t*3+1],geom.index.array[t*3+2]]:[t*3,t*3+1,t*3+2];
    const outer=[],inner=[];
    for(let t=0;t<triCount;t++){const[a,b,c]=tri(t);
      const cy=(pos[a*3+1]+pos[b*3+1]+pos[c*3+1])/3,cz=(pos[a*3+2]+pos[b*3+2]+pos[c*3+2])/3;
      const rl=Math.hypot(cy,cz)||1;
      const ny=(nor[a*3+1]+nor[b*3+1]+nor[c*3+1])/3,nz=(nor[a*3+2]+nor[b*3+2]+nor[c*3+2])/3;
      (ny*cy/rl+nz*cz/rl<-.3?inner:outer).push(a,b,c);}
    geom.setIndex(outer.concat(inner));geom.clearGroups();
    geom.addGroup(0,outer.length,0);geom.addGroup(outer.length,inner.length,1);
  }
  const loader=new THREE.GLTFLoader();
  const bin=Uint8Array.from(atob(window.RING_GLB),ch=>ch.charCodeAt(0));
  loader.parse(bin.buffer,'',gltf=>{
    gltf.scene.traverse(o=>{if(o.isMesh){makeTwoTone(o.geometry);o.material=[ringMat,innerMat];}});
    spinner.add(gltf.scene);if(loadingEl)loadingEl.style.display='none';
  },err=>{console.error(err);if(loadingEl)loadingEl.textContent='render failed';});
  (function loop(){requestAnimationFrame(loop);spinner.rotation.x+=0.0045;renderer.render(scene,camera);})();
})();
</script>
